services:
  postgres:
    image: postgres:12.2-alpine
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql:/docker-entrypoint-initdb.d
    networks:
      - shared-network

  spark:
    build:
      dockerfile: infra/spark/Spark.Dockerfile
      context: ..
    ports:
      - "4041:4041"
      - "18080:18080"
      - "4040:4040"
      - "7077:7077"
    env_file:
      - ../.env
    environment:
      SPARK_WORKER_MEMORY: 5g
      SPARK_WORKER_CORES: 2
      SPARK_DRIVER_MEMORY: 1.5g
    mem_limit: 5g
    memswap_limit: 5g
    volumes:
      - ../scripts:/home/hostuser/app/apps/scripts
      - ../data:/opt/airflow/data
    networks:
      - shared-network

volumes:
  postgres_data:

networks:
  shared-network:
    driver: bridge